<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Shopping - Catálogo de Lentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
        }

        header {
            background: #000000;
            color: white;
            padding: 50px 20px 45px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 3.2em;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            font-style: italic;
        }

        header p {
            font-size: 0.85em;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .brand-section {
            margin-bottom: 80px;
        }

        .brand-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.9em;
            color: #ffffff;
            margin-bottom: 40px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
            font-weight: 400;
            letter-spacing: 2px;
            font-style: italic;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #2d2d2d;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.2);
            border-color: #25D366;
        }

        .product-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background-color: #2d2d2d;
            display: block;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .product-image:hover {
            transform: scale(1.05);
        }

        .product-info {
            padding: 16px 20px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .price {
            font-size: 1em;
            font-weight: 400;
            color: #cccccc;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: 0.5px;
        }

        .whatsapp-btn:hover {
            background-color: #1ead4f;
            transform: scale(1.02);
        }

        footer {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
            font-size: 0.95em;
            border-top: 1px solid #2d2d2d;
        }

        footer a {
            color: #25D366;
            text-decoration: none;
            font-weight: 700;
        }

        .no-products {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1em;
        }

        /* Modal para ver imagen grande */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            right: 30px;
            top: 30px;
            color: #25D366;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: #25D366;
            color: #000;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 15px;
            }

            .product-image {
                height: 180px;
            }

            .price {
                font-size: 0.9em;
            }

            .brand-title {
                font-size: 1.4em;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }

            header h1 {
                font-size: 1.5em;
            }

            .brand-title {
                font-size: 1.3em;
            }

            .container {
                margin: 30px auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <img id="logo" src="logo.jpeg" alt="Easy Shop Logo" style="max-width: 200px; margin-bottom: 25px; height: auto; background: transparent;">
        <h1 id="titulo">Easy Shop</h1>
        <p id="subtitulo">Catálogo de Lentes Premium</p>
    </header>

    <div class="container">
        <div id="catalog" class="loading">Cargando catálogo...</div>
    </div>

    <footer>
        <p>📱 Contáctanos por WhatsApp: <a id="whatsapp-link" href="#"></a></p>
        <p style="margin-top: 20px; opacity: 0.8;">© 2024 Easy Shopping. Todos los derechos reservados.</p>
    </footer>

    <script>
        let datosProductos = {};

        document.addEventListener('DOMContentLoaded', async function() {
            await cargarProductos();
        });

        async function cargarProductos() {
            try {
                const response = await fetch('productos.json');
                
                if (!response.ok) {
                    mostrarError();
                    return;
                }

                datosProductos = await response.json();

                // Actualizar header
                document.getElementById('titulo').textContent = datosProductos.negocio || 'Easy Shopping';
                document.getElementById('subtitulo').textContent = datosProductos.descripcion || 'Catálogo de Lentes';

                // Actualizar WhatsApp footer
                const whatsappLink = document.getElementById('whatsapp-link');
                whatsappLink.href = `https://wa.me/${datosProductos.whatsapp.replace(/\D/g, '')}`;
                whatsappLink.textContent = datosProductos.whatsapp;

                // Renderizar catálogo
                renderizarCatalogo();

            } catch (error) {
                console.error('Error al cargar productos:', error);
                mostrarError();
            }
        }

        function renderizarCatalogo() {
            const catalogDiv = document.getElementById('catalog');

            if (!datosProductos.productos || datosProductos.productos.length === 0) {
                catalogDiv.innerHTML = '<div class="no-products">No hay productos disponibles</div>';
                return;
            }

            // Agrupar por marca
            const porMarca = {};
            datosProductos.productos.forEach(producto => {
                if (!porMarca[producto.marca]) {
                    porMarca[producto.marca] = [];
                }
                porMarca[producto.marca].push(producto);
            });

            // Renderizar secciones por marca
            catalogDiv.innerHTML = '';
            Object.keys(porMarca).forEach(marca => {
                const seccion = document.createElement('div');
                seccion.className = 'brand-section';

                const titulo = document.createElement('h2');
                titulo.className = 'brand-title';
                titulo.textContent = marca;

                const grid = document.createElement('div');
                grid.className = 'grid';

                porMarca[marca].forEach((producto, index) => {
                    const tarjeta = crearTarjetaProducto(producto, index);
                    grid.appendChild(tarjeta);
                });

                seccion.appendChild(titulo);
                seccion.appendChild(grid);
                catalogDiv.appendChild(seccion);
            });
        }

        function crearTarjetaProducto(producto, index) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const img = document.createElement('img');
            img.className = 'product-image';
            img.src = producto.imagen;
            img.alt = `${producto.marca}`;
            img.loading = 'lazy';
            img.style.cursor = 'pointer';

            // Evento para abrir imagen en pestaña nueva
            img.addEventListener('click', function() {
                window.open(producto.imagen, '_blank');
            });

            const info = document.createElement('div');
            info.className = 'product-info';

            const leftCol = document.createElement('div');
            leftCol.style.cssText = 'display: flex; flex-direction: column; gap: 2px;';

            const precio = document.createElement('div');
            precio.className = 'price';
            precio.textContent = datosProductos.precio || '$35';

            const codigo = document.createElement('div');
            codigo.style.cssText = 'font-size: 10px; color: #666; letter-spacing: 1px; text-transform: uppercase;';
            codigo.textContent = producto.codigo || '';

            leftCol.appendChild(precio);
            leftCol.appendChild(codigo);

            const btn = crearLinkWhatsApp(producto.marca, producto.codigo);

            info.appendChild(leftCol);
            info.appendChild(btn);

            card.appendChild(img);
            card.appendChild(info);

            return card;
        }

        function crearLinkWhatsApp(nombreProducto, codigo) {
            const numero = datosProductos.whatsapp.replace(/\D/g, '');
            const mensaje = `Hola, me interesa el lente *${nombreProducto}* — Código: *${codigo}* — Precio: ${datosProductos.precio}`;
            const mensajeCodificado = encodeURIComponent(mensaje);
            
            const linkWrapper = document.createElement('a');
            linkWrapper.href = `https://wa.me/${numero}?text=${mensajeCodificado}`;
            linkWrapper.target = '_blank';
            linkWrapper.style.cssText = `
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 7px 14px;
                background: transparent;
                color: white;
                text-decoration: none;
                font-family: 'Inter', 'Segoe UI', sans-serif;
                font-size: 11px;
                font-weight: 400;
                border-radius: 50px;
                border: 1px solid #444;
                transition: all 0.3s ease;
                justify-content: center;
                cursor: pointer;
                white-space: nowrap;
            `;
            
            linkWrapper.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="white" viewBox="0 0 24 24">
                    <path d="M20.52 3.48A11.84 11.84 0 0 0 12.07 0C5.5 0 .15 5.34.15 11.92c0 2.1.55 4.16 1.6 5.97L0 24l6.28-1.64a11.89 11.89 0 0 0 5.79 1.48h.01c6.57 0 11.92-5.35 11.92-11.92 0-3.18-1.24-6.16-3.48-8.44zM12.08 21.8a9.86 9.86 0 0 1-5.03-1.38l-.36-.21-3.73.98 1-3.64-.23-.37a9.83 9.83 0 1 1 8.35 4.62zm5.41-7.37c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.17-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.48-1.75-1.65-2.05-.17-.3-.02-.47.13-.62.13-.13.3-.35.45-.52.15-.18.2-.3.3-.5.1-.2.05-.37-.03-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.08-.8.38-.27.3-1.05 1.03-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.12 3.23 5.13 4.53.72.31 1.28.49 1.72.62.72.23 1.37.2 1.88.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.18-1.42-.08-.13-.28-.2-.58-.35z"/>
                </svg>
                Contactar por WhatsApp
            `;
            
            linkWrapper.addEventListener('mouseover', function() {
                this.style.borderColor = '#25D366';
                this.style.color = '#25D366';
            });
            
            linkWrapper.addEventListener('mouseout', function() {
                this.style.borderColor = '#444';
                this.style.color = 'white';
            });
            
            return linkWrapper;
        }

        function mostrarError() {
            document.getElementById('catalog').innerHTML = `
                <div class="no-products">
                    <h2 style="color: #25D366; margin-bottom: 20px;">Error al cargar el catálogo</h2>
                    <p style="margin: 15px 0;">Verifica que el archivo <strong>productos.json</strong> esté en la raíz del repositorio.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
